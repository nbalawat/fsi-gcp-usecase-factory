use_case_id: credit-memo-commercial-test
persona:
  primary: "Credit Officer (final-approval authority)"
  context: "Reviews dozens of memos a week; needs to read recommendation + key facts in under 30 seconds before deciding whether to dig in."
density_score: 1
motion_budget: minimal
affordance_pattern: right-rail-panel
primary_metaphor: document-first
components_used:
  - name: ApprovalGate
    source: shared
  - name: StatusBadge
    source: shared
  - name: StatCard
    source: shared
  - name: ExecutiveHeader
    source: use-case
  - name: DecisionHero
    source: use-case
  - name: RightRail
    source: use-case
  - name: RuleStrip
    source: use-case
  - name: ApprovalFlowClient
    source: use-case
routes_implemented:
  - case-detail
  - approval-flow
design_summary: |
  Sparse executive surface. The artifact (the recommendation hero) IS the page.
  Chrome compresses to a 56px top strip + a 240px right-rail of HITL gate
  statuses. Approval flow is a single max-w-2xl column where decided gates
  collapse to one-line strips, leaving only the active gate visible.
tradeoffs:
  optimised_for:
    - 30-second executive scan: decision word + rationale visible without scroll
    - Single-column approval flow keeps the active gate the only attention sink
    - Reuses shared primitives verbatim (ApprovalGate, StatusBadge, StatCard)
  sacrifices:
    - No live event-stream tile on the case page (disclosure under <details>)
    - No agent reasoning panel surfaced by default
    - Analysts who need to spelunk the spread will need to descend into citations
hero_screenshot: hero.png
build:
  a11y_violations: 0
  a11y_scan_mode: "static-heuristic"
  a11y_violation_codes:
  reuse_count_net_new: 0
  reuse_count_shared: 8
  reuse_floor_met: true
judge:
  composite_score: 2.84
  ui_standards: 3.6
  agentic_principles: 2.0
  reuse_count: 8
  reuse_floor_met: true
  hitl_gates_wired: true
  net_new_count: 5
  recommended: false
  ranking_position: 4
  violations:
    - "ui-standards Rule 3.1 / Section 2: hand-rolled <header> in components/ExecutiveHeader.tsx replaces the required <AppShell> chrome — page is not AppShell-rooted"
    - "ui-standards Rule 1.6 (no arbitrary tokens): components/DecisionHero.tsx:53 uses 'text-[96px]' arbitrary Tailwind value; no matching type-ramp token"
    - "ui-standards Rule 4.12 (no Intl.NumberFormat in components/pages): app/case/[id]/page.tsx:22 calls 'new Intl.NumberFormat(\"en-US\")' inline — will hydrate inconsistently across SSR/CSR"
    - "agentic-ui Principle 1 (event-spine-first) is explicitly sacrificed — no live PipelineActivity/event-stream tile on the case page"
    - "agentic-ui Principle 3 (agent activity visible live) is explicitly sacrificed — no per-agent reasoning surface; citations only via collapsed <details>"
    - "agentic-ui Principle 2 (process metaphor) is thin — current stage shown only as a header badge, no stage rail"
  strengths:
    - "Cleanest 30-second-scan layout — DecisionHero with hero-sized recommendation word, short rationale, three-stat row"
    - "Components are pure presentation; lib/data.ts contains all data shaping and is the only place math could leak (none does)"
    - "All 4 HITL gates wired through the shared ApprovalGate primitive in ApprovalFlowClient, including a hard build-time assertion that no canvas gate is missing a surface"
    - "ApprovalFlowClient collapses decided gates to one-line strips so the active gate is the only attention sink — strongest single-column approval UX"
    - "Right-rail is the only navigator and every entry is a real <Link href> — no decorative chrome"
