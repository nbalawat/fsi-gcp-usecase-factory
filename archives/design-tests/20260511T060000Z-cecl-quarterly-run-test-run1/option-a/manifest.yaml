design_summary: |
  Option A treats the run as a SINGLE NUMBER you sign, supported by a
  four-stage horizontal rail at the top. The rail IS the page: every
  pixel below the rail responds to which stage is open. Sparse density
  for the hero (one allowance, one delta, one exceptions count, one
  OCC clock) so the executive reads the run's state at a glance.
  Click a stage and the dense numeric ledger (12 segments × 4 forecast
  quarters × bps) unfolds inline — that's where the analyst-level
  detail lives, behind the executive surface.

tradeoffs:
  optimised_for:
    - CFO/CRO at-a-glance comprehension — three numbers and a clock
    - Stage rail makes "where are we in the OCC 30-day window" answerable in one second
    - Dense per-segment ledger available without leaving the page
    - Approval flow surfaces the irrevocable GL posting + qual-overlay context inline
    - Heavy reuse of shared primitives — 9 shared, novelty is the stage rail + ledger composition
  sacrifices:
    - Story / transcript view of HOW the allowance was produced is collapsed (option D's territory)
    - Per-cell drill-into-event (which agent set this PD) is not first-class — the audit trail lives on the run-detail page only
    - No live SSE stream — the rail status is derived from events at render time (Rule 13 trade-off: this view is intended for executive review, not in-flight monitoring)
    - Segment-level human override UI is intentionally read-only here; overrides happen earlier in the workflow

