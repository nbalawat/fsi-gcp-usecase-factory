persona:
  primary: "Underwriter / Credit officer disposing a multi-stage memo"
  context: |
    The reviewer reads the memo section-by-section. Each section ends
    with the decision it enables (approve / edit & approve / request
    revision / reject), so the eye never has to leave the section to
    act on it. No sticky bottom bar, no modal drawer, no second
    "review-then-approve" page.

