design_summary: |
  Option C makes the memo a sequence of FIVE sections — borrower &
  documents, extraction, spread & rating, draft, final — and ends every
  section that closes a HITL gate with its own inline affordance row.
  The four affordances (approve, edit & approve, request revision,
  reject) live as real <button>s directly under the evidence that
  produced them; comment-required dispositions reveal a textarea
  in-place; the irrevocable final approval surfaces a confirm strap
  before posting. There is no sticky bottom bar. The approval flow is
  the same memo, filtered to the gated sections and anchored to the
  reviewer's focus gate.

tradeoffs:
  optimised_for:
    - Decisions live next to the data that informs them
    - Reviewer never context-switches to a separate approval page or modal
    - Each affordance is a real button with an onClick handler (ui-standards Rule 1)
    - Per-gate recommendation appears AT the affordance row — not elsewhere
    - Sectioned reading discipline — you cannot accidentally approve a section you have not read
    - Five shared primitives carry shell + signoff scaffolding
  sacrifices:
    - No single bulk-approve affordance (intentional — every section gets its own disposition)
    - Long pages on the case-detail view; reliant on the right-rail anchor nav to navigate
    - Inline expansion of the comment box temporarily increases section height
    - Compared to a chat-style transcript, the section boundary obscures fine cross-stage timing
    - Approval flow shows 4 sections; the borrower-intake section is intentionally not in scope

