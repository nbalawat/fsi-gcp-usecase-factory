persona:
  primary: "Credit officer / underwriter following a case through the pipeline"
  context: |
    Thinks in stages, not in transcripts and not in documents. Wants to
    know "where is this case in the workflow right now, what fired in
    this stage, and what's the gate I need to clear next?" The pipeline
    is the spatial metaphor.

