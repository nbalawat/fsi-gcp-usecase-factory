design_summary: |
  Option B treats the WORKFLOW as the metaphor. Stages drive layout: the
  current stage is the hero (~60% of viewport at lg+), prior stages
  compress to a left rail as status pills (click to expand the bucket
  of events that fired there), future stages dim on a right rail. The
  shared WorkflowStageRail sits above as the spine — the page's
  navigation IS the pipeline. The approval flow keeps the same rail and
  renders each gate as the slice of workflow that led to it.

tradeoffs:
  optimised_for:
    - Spatial comprehension — the reader sees the pipeline at one glance
    - Stage-scoped focus — the hero shows ONLY what fired in the current stage
    - "Where am I?" answered by the rail on every page
    - Reuse — eight shared primitives carry the foundation; the
      WorkflowStageRail is the load-bearing spine and the AppShell is
      the chrome.
  sacrifices:
    - The story-as-time-axis is less direct (events are bucketed by stage,
      not laid out as one chronological column)
    - Per-metric data (DSCR, leverage) appears only as rule verdicts —
      no numeric hero
    - Heavy on layout (3-column at lg+); collapses to one column at sm
      so the rail and side-rails stack
    - Memo PDF is not the centerpiece — the stage activity is
