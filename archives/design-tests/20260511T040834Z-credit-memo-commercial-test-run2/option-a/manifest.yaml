design_summary: |
  Option A treats the case as an EXECUTIVE DECISION CARD. The page hero
  is one oversize artifact: borrower identity, recommendation verb,
  risk-band badge, a single-sentence rationale, and four signal counts
  on one horizontal line. Below the card live a compressed gate-pill
  row and an inline rule-verdict row. Chrome compresses to a thin top
  WorkflowStageRail + 3-metric strip and a 14-rem right rail
  (RegulatoryClock + canvas pin). The approval flow page asks ONE
  question — "approve this gate?" — with a StepProgress at the header,
  a GatePillRow as a stepper, and the shared <ApprovalGate> primitive
  rendered full-width as the only content surface.

tradeoffs:
  optimised_for:
    - 30-second executive scan — recommendation visible without scrolling
    - Decision-card-is-the-artifact — the page IS the deliverable
    - Reuse — nine shared primitives carry the chrome, the stage rail, the clock, and the signoff
    - Sparse cognitive load — three KPIs not five, four signals not twenty
    - Process metaphor preserved via thin top WorkflowStageRail
  sacrifices:
    - No agent reasoning surface on the case page (counts only — drill is implicit)
    - No transcript / event timeline (the spine is not visible on this view)
    - No citation drill-in (executives delegate to the analyst gate)
    - No data-density power-user view (DSCR / leverage values are summary counts)
    - Approval page sacrifices "review the work first" — exec sees recommendation + signoff in one card

