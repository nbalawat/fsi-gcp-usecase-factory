persona:
  primary: "Chief Credit Officer (executive who delegates the analysis but owns the irrevocable approval)"
  context: |
    Scans 8-12 cases / day for ~30 seconds each before deep-reading the
    one or two with adverse signals. Needs the recommendation, the risk
    band, and ONE sentence of "why" — anything more delays the read.
    Will sign off on the final gate; the upstream three are delegated.
    Comes back later if the page tells them to.

