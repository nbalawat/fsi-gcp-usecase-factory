persona:
  primary: "Credit officer / examiner performing forensic verification of a decision"
  context: |
    Reads cases as a value DAG. For any value on screen, can answer in
    one click: "where did this come from?" (backward chain to the
    citation page/bbox/excerpt) and "what did this affect?" (forward
    chain to the credit decision). HITL gates are framed as trust
    attestations over a subtree — the reviewer signs off on the
    provenance, not on a memo.

