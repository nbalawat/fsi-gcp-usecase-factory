design_summary: |
  Option D run-2 treats the case as a PROVENANCE GRAPH. Every value
  the case touches — extracted from documents, computed by services,
  reasoned by agents, or decided by rules and humans — is one node in
  a directed acyclic graph. Each node card carries its citation
  (page, bbox, excerpt, confidence) and its forward/backward edges
  inline. The right rail is a forensic inspector: pick a value, see
  the full chain to its source document AND the full chain to the
  credit decision. The approval flow reframes every HITL gate as a
  trust attestation over a specific subtree of the graph — reviewers
  sign off on the provenance, not on a memo.

tradeoffs:
  optimised_for:
    - Forensic audit — "where did this number come from" is one click, every time
    - Examiner / regulator workflow — provenance subtrees ARE the attestation surface
    - Surfaces low-confidence extractions to the top of the reviewer's queue
    - Reuse — six shared primitives (AppShell, BreadcrumbNav, MetricStrip, StatCard, StatusBadge, ApprovalGate); novelty is the graph wiring
  sacrifices:
    - Chronological order is gone — readers who want a postmortem story still need the conversation view
    - Density is higher than sparse-density (A) by design — every value carries its provenance inline
    - Pipeline-stage spatial metaphor (left-to-right rail) is intentionally absent
    - For greenfield cases with no upstream history yet, the right-rail inspector starts thin (default low-confidence node)
