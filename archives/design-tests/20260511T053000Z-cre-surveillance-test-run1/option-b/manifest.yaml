persona:
  primary: "Chief Credit Officer scanning portfolio concentration; line risk officer following up on a flagged facility"
  context: |
    The CCO needs to answer "where is our CRE risk concentrating?" in
    one glance. The map IS the answer. From the map, drilling into a
    facility preserves the spatial metaphor — a state cluster strip and
    a region-highlighted band keep the user oriented while they read
    the facility detail or book a reserve.

