design_summary: |
  Option B uses the GEOGRAPHIC MAP as the page spine. The home surface
  renders a 2x2 US census-region tile grid (Northeast / Midwest / South
  / West), each tile colored by aggregate watchlist density (5-step
  heat scale, all from tokens — no arbitrary values). Below the tile
  grid, a state-cluster strip lets the user drill from "where is the
  risk?" to "which facilities are driving it?" without leaving the
  metaphor. The facility-detail and approval-flow pages keep the metaphor
  alive: every page opens with a FacilityLocator band that highlights
  the user's current region inside the 4-region map and lists sibling
  facilities in the state cluster as chips. The approval flow embeds
  the shared ApprovalGate primitive inline — the reviewer never leaves
  the geographic anchor.

tradeoffs:
  optimised_for:
    - Spatial concentration discovery — "where is the risk?" answers in one glance
    - Drill continuity — every page repeats the locator band so the user never loses orientation
    - Token-only color discipline — heat scale is paper-2 → info-tint → warning-tint → danger-tint → riskBand-5-loss (no arbitrary values)
    - Reuse — six shared primitives (AppShell, BreadcrumbNav, MetricStrip, StatCard, StatusBadge, ApprovalGate)
    - Server Components by default; "use client" only on the approval island
  sacrifices:
    - True cartography is approximated by a 4-tile census-region grid (we don't ship a real US map SVG to keep the bundle slim)
    - Time-series and stage-rail spatial metaphors are intentionally absent — geography is the only axis
    - Dense per-facility tables (NOI, cap-rate ladder, valuation history) are summarised, not foregrounded

build:
