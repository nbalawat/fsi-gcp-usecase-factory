persona:
  primary: "BSA Analyst writing the narrative"
  context: |
    Reads the SAR draft top-to-bottom. Needs to verify every factual
    claim in the narrative against the underlying evidence WITHOUT
    leaving the prose. Every claim carries an inline citation chip that
    opens the source record (transaction, account history, geography
    signal, agent reasoning, atomic-service output, or rule verdict) in
    a sticky right-rail drawer. Inline flag / dispute / add-note
    actions next to each claim. The approval surface is the same
    annotated narrative.

