design_summary: |
  Option C treats the SAR draft as an ANNOTATED DOCUMENT. The narrative
  is the page; every claim is one paragraph with an inline-citation
  group at the end of its prose; each citation chip is a tight mono
  affordance ([TXN 04891], [GEO MX], [AGT categorizer], [SVC peer], etc.)
  that drives a sticky right-rail EvidenceDrawer where the source record
  appears. Below every claim sit three inline actions - flag this,
  dispute this, add note - so the analyst can dispose of disagreement
  without leaving the prose. The /approval/[id] route renders the same
  annotated narrative with the shared ApprovalGate primitive inline at
  the bottom of the document: the approval surface IS the narrative.

tradeoffs:
  optimised_for:
    - Evidence transparency - every claim cites its source, by construction
    - Audit explainability - examiner clicks chip, sees source record
    - Inline disposition - flag / dispute / note next to the claim
    - Reading flow - the analyst's eye never leaves the narrative line
    - Reuse - seven shared primitives carry the foundation
  sacrifices:
    - Vertical scrolling dominates - not optimised for scanning many cases
    - The chronological event spine is implicit; not surfaced as a transcript
    - Per-claim density is high - more text to read than a dashboard layout
    - Single right rail constrains how many citations can be open at once
    - The pattern is not a workflow-stage spatial metaphor

