persona:
  primary: "BSA / AML investigator deciding whether to file the SAR"
  context: |
    Thinks in counterparties and edges, not in rows or pages. The
    investigation is fundamentally about HIDDEN RELATIONSHIPS — banks
    file SARs because parties are connected in ways that resemble
    structuring or laundering. The investigator wants to see the
    subject in the middle of its related-parties network, scrub the
    edges that look suspicious, and let the narrative write itself
    FROM the selected sub-graph. Filing is freezing the sub-graph and
    signing off.

