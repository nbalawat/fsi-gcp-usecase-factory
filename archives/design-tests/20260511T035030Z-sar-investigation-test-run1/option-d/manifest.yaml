design_summary: |
  Option D treats the SAR case as ITS COUNTERPARTY GRAPH. The subject
  sits at the center; each transaction is an edge fanning out to a
  counterparty node; each agent reasoning is a dashed edge. The BSA
  investigator clicks edges to add them to the SAR narrative
  selection — the narrative draft regenerates in real time from the
  selected sub-graph. Filing the SAR is freezing the sub-graph and
  signing off through the shared ApprovalGate primitive, rendered
  inline below the narrative on the approval route.

  The audit ledger lives in the right rail with one row per Pub/Sub
  event (event-spine-first), cross-linked to the graph by `idx`. The
  30-day FinCEN clock is a first-class instrument (RegulatoryClock
  shared primitive) on both routes.

tradeoffs:
  optimised_for:
    - Surfacing hidden relationships — graph is the page, not a drawer
    - Selection-driven narrative — what's filed = what's selected (defensible)
    - Examiner explainability — every node and edge maps to one canvas event
    - Inline disposition — approval gate sits below the live filing scope
    - Compliance instruments — RegulatoryClock + rule verdicts visible without stealing focus
  sacrifices:
    - Wide graph viewport — narrow drawers / mobile compressed will degrade
    - No spatial pipeline-stage rail — process is implicit in audit-ledger ordering
    - Transaction tables (rows of wires with amounts) are not the hero — they live in the inspector
    - Memo PDF / SAR Form 111 export is NOT the centerpiece — it's a downstream artifact of the sub-graph

