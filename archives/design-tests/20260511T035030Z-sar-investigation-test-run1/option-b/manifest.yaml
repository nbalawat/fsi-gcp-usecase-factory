design_summary: |
  Option B treats the 30-day BSA SAR clock as the dominant metaphor.
  A large, live RegulatoryClock sits at the top of every viewport.
  Below the clock, the investigation reads as a small set of
  clock-anchored sections (Day 0 detection / Days 1–3 triage / Days
  4–14 investigation / Days 15–25 drafting / Days 26–30 review),
  each containing the events that fell inside its day band. Every
  event row carries a days-remaining anchor on its left rail. The
  approval flow re-uses the same hero clock and the same anchored
  event rows — signoff happens in the shadow of the deadline, not
  in a separate "approval app".

tradeoffs:
  optimised_for:
    - Deadline awareness — the clock is unmissable on every page
    - Temporal comprehension — "what happens by when" is read off the day axis
    - Regulatory framing — the page mirrors the BSA 30-day regime exactly
    - Inline signoff against the same clock that runs the case
  sacrifices:
    - Per-event density (tokens, latency) is summarised, not foregrounded
    - The SAR narrative PDF is not the centerpiece — the deadline-anchored events are
    - Spatial process metaphor (left-to-right pipeline rail) is secondary to the clock
    - Cases not yet near the deadline get less visual emphasis on the clock band

