design_summary: |
  Option B treats the CUSTOMER RELATIONSHIP as the metaphor. Each card
  is one story: the agent narrates the recent activity timeline of the
  customer, what they noticed, why it matters now, and what to propose.
  Evidence + safety chips support the story; the disposition gate acts
  on the story. The RM reads stories, not tables.

  Self-contained build (Rule 38): NO _vendor symlinks. The six shared
  primitives are inlined under components/primitives/ — each file
  carries a header comment recording its provenance against
  ui/packages/components/src/<name>.tsx. Local mock data lives under
  lib/data.ts (no _shared/ dependency).

tradeoffs:
  optimised_for:
    - Story comprehension — the RM reads "the customer did X, here's what to do"
    - Trust-building — every story is supported by evidence + safety chips
    - Inline disposition — the gate is in the story, not a separate screen
    - Reuse — six shared primitives carry the chrome; novelty is the narrative shape
    - Self-contained build — no vendor symlinks, no _shared dependency
  sacrifices:
    - Dense per-metric data (DSO, LTV, IRR) summarised in prose, not tables
    - Vertical reading dominates; less efficient for triaging 50+ items than a grid
    - Less spatial pipeline metaphor — the relationship IS the spatial axis

