affordance_pattern: hero-decision + countdown clock + one-line reason + tiny right rail

design_summary: >
  Sparse executive layout for the BSA / AML SAR officer who triages dozens
  of alerts an hour. The case page collapses to exactly three things: the
  recommended decision (file SAR / dismiss / escalate) rendered at display
  scale, the 30-day FinCEN regulatory countdown clock, and the single
  alert reason that explains why the case is on the queue. Everything
  else — borrower network, exposure aggregation, peer-and-industry context,
  draft narrative, full event log — is compressed to a 22rem right rail
  (gates, rule badges, named-actor activity list, canvas pin) or hidden
  one click behind the approval gate. The approval page reuses the same
  shape: compact hero + clock side-by-side, the ApprovalGate primitive
  centred, and the evidence chain reduced to a named-source list.

tradeoffs:
  - Officer cannot inspect a single agent's reasoning trace from the case page; they must open the approval gate.
  - Less-experienced analysts may miss the rich context an investigation-heavy layout would provide.
  - Right rail risks under-use because the eye is trained on the centre column.
  - The 30-day clock is computed from the first event timestamp; cases that re-open will need a recomputed alertedAt.

