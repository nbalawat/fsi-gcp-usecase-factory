design_summary: |
  Workflow-first: the nine canvas stages drive the layout. The current stage is the hero
  (60% of the viewport), prior stages compress to a left rail with status pills (clickable
  anchors), future stages are dimmed but visible. Pipeline activity is the SPINE of the
  page — a horizontal event strip grouped by stage, not a drawer. The user always knows
  what stage they're in, what just happened, and what to action next.
tradeoffs:
  optimised_for:
    - "Always know what stage you're in"
    - "Pipeline traceability is one glance — the spine shows every event grouped by stage"
    - "Stage-anchored deep links: the rail's hrefs route to #stage-<id> on case, #gate-<id> on approval"
    - "HITL gates are first-class — four-gate chain on the approval page renders one ApprovalGate per gate, with live + decided modes"
    - "Reuse-first: 8 shared primitives carry the heavy lifting; UC code is composition and vocabulary"
  sacrifices:
    - "Less artifact-as-the-page — the credit memo body isn't the hero; the stage is"
    - "Density score 3, not 4: keeps three structural bands (rail + hero + spine) visible always"
    - "Approval page is gate-sequential rather than threshold-table — credit officers who prefer a single rule grid will need to scroll past the chain"
    - "No artifact deep-edit in this proposal — that lives in option C/D"
