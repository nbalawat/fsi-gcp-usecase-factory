[pytest]
# Top-level pytest collects framework tests + use-case agent + e2e tests.
# Atomic service tests are run per-service via scripts/test_all_services.sh
# (each service has its own pyproject.toml + tests/ that aren't collected here).
testpaths =
    tests
    usecases/credit-memo-commercial/tests
# Agent tests under usecases/<uc>/agents/tests/ require google.adk runtime
# (Vertex AI Agent Builder SDK) and are run separately by scripts/test_all_agents.sh
# in environments where that SDK is installed.
# Exclude fixture trees (they contain stub services with their own test files
# that conflict on basename across scenarios) and the agents/tests/ tree
# (requires google.adk).
norecursedirs = node_modules .git .terraform __pycache__ ui fixtures agents
markers =
    llm: tests that invoke a real Claude agent via Anthropic API (gated by RUN_LLM_TESTS=1)
    adversarial: agent adversarial tests (require google.adk; run via scripts/test_all_agents.sh)
    live: tests that hit live GCP / Anthropic APIs
