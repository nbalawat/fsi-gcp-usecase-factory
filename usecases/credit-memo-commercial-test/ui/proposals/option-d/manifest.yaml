design_summary: |
  Option D treats the case as a CONVERSATION TRANSCRIPT. Every agent
  reasoning, every atomic service call, every rule verdict, every human
  gate is one chronological row. The approval flow is the same
  transcript, scoped to the slice that led to each gate, with the
  ApprovalGate primitive rendered inline at the bottom of the scope.

tradeoffs:
  optimised_for:
    - Story comprehension — the case reads top-to-bottom like a postmortem
    - Audit explainability — every event is on screen with timestamp and actor
    - Inline gate disposition — no separate "review-then-approve" hop
    - Reuse — five shared primitives carry the foundation; novelty is in orchestration
  sacrifices:
    - Dense per-metric data (DSCR, leverage values) is summarised, not foregrounded
    - Memo PDF is not the centerpiece — the conversation that produced it is
    - Vertical scrolling dominates; less efficient than a fixed-grid layout for skimming many cases
    - Pipeline-stage spatial metaphor (left-to-right rail) is intentionally absent

