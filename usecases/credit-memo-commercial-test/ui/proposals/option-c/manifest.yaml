design_summary: |
  Inline-per-section beats sticky/modal because the analyst's eye never has
  to leave the data that informs the decision. Approve / edit / request-
  revision / reject sit AT THE END of every memo section — extraction,
  spread, peer, collateral, network, rating, rules, draft, final.
  The approval route mirrors the philosophy: it's a fast-track summary of
  inline decisions, not a separate review surface; jump-back links return
  the officer to the exact section that still needs attention.

tradeoffs:
  optimised_for:
    - "act on what you see immediately — no context-switching"
    - "every HITL gate maps to the section that informs it"
    - "audit trail captures section-level decisions, not bulk approvals"
    - "fast-track sign-off when all inline decisions are clean"
    - "jump-back links preserve mental context"
  sacrifices:
    - "no single bulk 'approve everything' button on the memo page"
    - "longer vertical scroll than a tabbed/drawer design"
    - "decision state is per-section, so partial saves matter"
    - "approval officer must trust the analyst's inline trail or jump back"

