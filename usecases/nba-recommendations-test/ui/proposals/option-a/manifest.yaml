design_summary: |
  Option A treats the queue AS the page. RMs see every pending
  recommendation as one dense row containing customer (CaseCard),
  recommended action + one-line rationale, confidence, annualised
  uplift, expiry urgency, and inline disposition buttons. Each row
  is a complete unit — Accept / Snooze / Dismiss are reversible and
  fire without leaving the table. The irrevocable "Send to customer"
  action is the ONLY one that routes the RM through a confirm step;
  it lands on /approval/[id] which wraps the shared ApprovalGate
  primitive. The detail view at /case/[id] is for "I need to drill
  in" — full rationale, fit/uplift/regulatory triad, and the agent
  reasoning trail (peer-and-industry-context, exposure-aggregator,
  next-best-action recommender, regulatory-clearance rule).

tradeoffs:
  optimised_for:
    - Throughput — 50-200 recs/day on a single dense surface, no pagination
    - Triage efficiency — three reversible buttons sit on every row; one click closes the loop
    - Audit clarity — every row carries the canvas-pinned uplift_score, fit_score, regulatory_clear; the agent trail is one drill-in away
    - Reuse — seven shared primitives carry the chrome; novelty is in the row composition
  sacrifices:
    - Rich per-recommendation visualisation (charts, peer benchmarks) is intentionally absent from the row — that's detail-page material
    - Workflow-stage spatial metaphor is downscaled to a single status chip — the queue is a flat list, not a pipeline
    - Real-time motion is intentionally minimal — the page is a tool for sustained triage, not a live event monitor

