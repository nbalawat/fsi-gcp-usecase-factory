design_summary: |
  Option C treats each CECL segment as a one-row dispatch unit. The row
  itself carries the PD/LGD/EAD inputs that produced its reserve, the
  reserve number, the methodology owner, AND the action that segment
  enables — "Approve methodology" (reversible) or "Open variance Q&A"
  inline. No modal, no sticky bottom bar, no separate review screen.
  The user's eye never leaves the row to dispose of the row.

  CFO attestation is the SINGLE action that escapes inline. It is
  irrevocable per the canvas hitl_gates contract, regulator-visible, and
  lives on /approval where the run rolls up into one figure the CFO
  attests to. The header CTA to that surface only unlocks when all
  reversible segment approvals are recorded.

tradeoffs:
  optimised_for:
    - "Disposition speed — one click on the row, no context switch"
    - "Audit explainability — every action records on the same row that surfaces the inputs that triggered it"
    - "Reversibility — segment-methodology approvals are reversible right up until CFO attest"
    - "Reuse — seven shared primitives carry the foundation (AppShell, BreadcrumbNav, MetricStrip, RegulatoryClock, StatCard, StatusBadge, ApprovalGate); novelty is in the row composition"
    - "Single irrevocable escape — CFO attest is the only action that leaves the row, matching the canvas's one irrevocable gate"
  sacrifices:
    - "Wide rows — the 5-column row layout (ring + identity + inputs + reserve + action) degrades on narrow viewports; below 1024px collapses to a stack which is less efficient for skimming"
    - "No spatial pipeline-stage rail — process is implicit in the segment-row verdict badges, not a visual left-to-right axis"
    - "Variance Q&A is a single textarea, not a structured form — banker freedom over field-level validation"
    - "The audit ledger lives BELOW the rows (full-width section), not in a right rail — banker sees rows first, audit-as-SOP after"

