    reason: "Regulator-audit-first metaphor was interesting (citation chains, audit ledger) but 12 console errors at runtime indicate broken JS behavior. Also rolled own HITL surface with bare buttons instead of shared ApprovalGate — Rule-1 reuse regression. Worth re-running with proper primitive reuse + RSC-clean implementation."

dual_signal_lesson: |
  Tier 3 (surveillance pattern) confirms dual-signal validation again:
    - Judge ranked B first → confirmed cleanest by Playwright
    - Judge ranked A second → confirmed clean by Playwright (close 2nd)
    - Judge ranked D third → disqualified by 12 runtime console errors
  Judge and Playwright agreed on B as the winner; runtime broke the tie
  between B (4.30) and A (4.26) by showing B was cleaner. Different from
  Tier 1 (B failed at runtime entirely) and Tier 2 expansion (judge's #2
  D failed build entirely). The protocol handles all three failure modes.

