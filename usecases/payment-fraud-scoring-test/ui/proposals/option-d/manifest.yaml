use_case_id: payment-fraud-scoring-test

persona:
  primary: "Fraud Ops analyst monitoring the live fraud floor"
  context: |
    The analyst's first question every shift is "what is the model firing
    on right now?" They want to see — across the entire firing
    population, not one transaction at a time — which (feature × MCC)
    combinations are lighting up. A hot cell is a population, not a
    case; clicking it surfaces the individual firings that produced it.
    From a single firing, the analyst can navigate back to the cell to
    see siblings and confirm the pattern is real.

