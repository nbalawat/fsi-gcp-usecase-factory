    source: use-case

routes_implemented:
  - case-detail
  - approval-flow

design_summary: |
  Option C treats every declined transaction as a tuning surface. The
  decline reasons are surfaced as individual cards — and each card
  carries its own inline action buttons (override · this customer,
  allowlist · this merchant, tune · this threshold, step-up · 3DS).
  The analyst disposes the model from the reason, not from a separate
  workflow.

  `case/[id]` renders ONE transaction with the full reason set,
  `compact=false` (full explanation paragraph).

  `approval/[id]` renders the bulk decline-stream tuning surface — every
  row is itself a stack of reason cards in `compact=true` form, each
  with its own inline buttons. A local action log captures every
  queued tune so the analyst sees the trail being built.

variation_axis_notes: |
  affordance_pattern = inline-per-section. The five other options on the
  affordance axis (toolbar, drawer, modal, bulk-only, gesture) are
  explicitly NOT used here — every action is where the reason is.

tradeoffs:
  optimised_for:
    - Tuning velocity — analyst clicks override / allowlist / tune from the row
    - Decline reasoning legibility — every reason has its label, source, and explanation
    - No-hop disposition — affordance lives next to the explanation
    - Reuse — five shared primitives (AppShell, BreadcrumbNav, MetricStrip, StatCard, StatusBadge); UC primitives compose them
  sacrifices:
    - Vertical density (each row is taller than a tombstone-only list view)
    - Real-time motion (this is a tuning surface, not a streaming meter — motion_budget = minimal)
    - One-step disposition only (multi-row bulk select is intentionally NOT in scope)

mock_data:
  source: usecases/payment-fraud-scoring-test/ui/proposals/_shared/mock-data.ts
  read_only: true

build_seed:
  seed: |
    Every declined transaction shows its decline reason as a one-click
    'override' or 'add to allowlist' or 'tune threshold' button. The
    fraud analyst's job is not to approve transactions; it's to tune
    the model from the decline stream. Each row in the decline feed
    has its own inline action.
