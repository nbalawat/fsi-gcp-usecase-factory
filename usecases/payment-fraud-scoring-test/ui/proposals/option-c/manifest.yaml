schema_version: "1.0.0"
option: C
variation_axis: affordance
canvas_checksum: cc47591b9d1241218f08426d1f4ca8be84cd1b6cb4cb31bc23066ab2f9e80c5f
use_case_id: payment-fraud-scoring-test

persona:
  primary: "Fraud Ops analyst tuning the model from the decline feed"
  context: |
    The fraud analyst's job is NOT to approve individual transactions. The
    job is to read the decline stream and tune the model — override for a
    known-good customer, allowlist a misclassified merchant, adjust a rule
    threshold, or route into step-up. Every decline reason must therefore
    carry its own one-click affordance, inline, where the analyst is
    already looking. Hopping to a side panel breaks the flow.

density_score: 4
motion_budget: minimal
affordance_pattern: inline-per-section
primary_metaphor: decline-reason-actionable

components_used:
  - name: AppShell
    source: shared
  - name: BreadcrumbNav
    source: shared
  - name: MetricStrip
    source: shared
