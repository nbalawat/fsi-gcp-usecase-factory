design_summary: |
  Option B treats the MODEL as the primary metaphor. The page IS the
  model's behavior. Score distribution histogram (20 buckets, banded
  approve/gray/decline) is the hero — every transaction is a sample
  contributing to one of those bars. The feature-firing list shows
  which inputs are actually doing the work, with 24h drift indicators
  per feature. A single optional highlight pin lands the active sample
  on the curve.

  The case route ("one sample on the curve") drills into a single
  transaction: where on the histogram it lives, which features
  contributed (signed weights, normalised bars), and — only when the
  gray-zone agent was invoked — the agent's natural-language rationale
  and confidence.

  The approval route is reinterpreted as POLICY tuning, because the
  canvas declares zero per-transaction HITL gates. The ML-ops operator
  picks a threshold (velocity_threshold_by_mcc per MCC, decline-band
  floor, approve-band ceiling), proposes a value, sees the pre-shaped
  diff, and submits via the shared ApprovalGate primitive — the only
  path that records the change for audit.

tradeoffs:
  optimised_for:
    - Model-owner persona — every primary surface answers "how is the model behaving?"
    - Distribution-first thinking — the histogram makes drift visible at a glance
    - Sub-second emphasis — p99 latency is in the metric strip, the live ticker shows the millisecond clock
    - Reuse — six shared primitives (AppShell, BreadcrumbNav, MetricStrip, StatCard, StatusBadge, ApprovalGate) carry the foundation
    - Honest HITL framing — no fake per-case approval; the human-in-the-loop surface is policy, which matches the canvas
  sacrifices:
    - The individual transaction is not the unit of attention — investigators looking for one card's history will have to navigate elsewhere
    - No spatial pipeline rail (there are no stages worth pinning for sub-second flow)
    - The histogram is intentionally static-snapshot — no time-windowing slider
    - Per-feature drill (PDP / SHAP) is summarised, not foregrounded; this is a health monitor, not an evaluation harness

