persona:
  primary: "Fraud Ops Lead watching transactions at line rate"
  context: |
    The decision is already made by the gray-zone-fraud-scorer agent.
    The screen is a flood of approve / decline / step-up rows plus the
    three KPIs the Lead actually watches: rolling decline rate, p99
    agent latency, and a model drift gauge. The Lead drills into a row
    only when something looks off — most of the time the page is a
    pure throughput dashboard.

density_score: 1
motion_budget: minimal-tick-in
affordance_pattern: whole-row-link
primary_metaphor: throughput-stream

