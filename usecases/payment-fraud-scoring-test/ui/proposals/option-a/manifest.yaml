design_summary: |
  Option A treats the console as a TICKER. The home route is a flood of
  one-line decision rows scrolling past the Fraud Ops Lead at line rate;
  three sparse KPI tiles sit above (decline %, p99 latency, drift). The
  /case/[id] route is a single transaction's score-factor breakdown
  rendered as diverging bars + a one-line agent reasoning summary —
  enough to audit a decision in under five seconds. The /approval/[id]
  route is repurposed as a step-up challenge audit queue (the UC has
  zero HITL gates by design; the only place a human touches a case is
  reviewing how customers responded to step-up challenges).

  Variation axis: density. Every surface is single-line, tabular-nums,
  fixed-grid. Chrome is invisible: no cards, no shadows, no per-row
  padding-y beyond what one line of mono text needs. The whole row is
  the click target — never a single cell.

real_time_specifics:
  hitl_gates_required: 0
  hitl_gates_treatment: |
    Per agentic-ui-principles "human in the loop" principle: real-time
    UCs handle HITL via a step-up disposition review queue. The
    /approval/[id] route exposes this surface explicitly — it shows the
    customer's response to each challenge (passed / failed / expired)
    so Fraud Ops can audit a sample. No business decision is taken in
    this view; drill-in opens the underlying transaction.
  business_kpi: rolling-decline-rate
  latency_budget_ms: 800
  motion: |
    Only the most-recent 4 rows in the decision stream tick in with a
    400ms warning-tint fade. No marquee, no auto-scroll, no animation
    on KPI tiles. The Lead's eye scans, the rows do not jump.

tradeoffs:
  optimised_for:
    - Throughput comprehension — 64 rows visible on a single screen
    - Sub-second mental scan — same grid, same widths, every row
    - Decline-rate as headline KPI (the bank's primary fraud metric)
    - Drill-down audit (whole-row link → /case/[id] → score factors)
    - Step-up audit (the one human-touch surface in a 0-HITL UC)
  sacrifices:
    - No "agent thinking" tile on the home page — that lives behind
      the transaction detail (one extra click). Density 1 means the
      stream wins over per-row reasoning previews.
    - No 2D state grid (surveillance-console style); throughput beats
      cross-section for this persona.
    - No workflow-stage rail — the real-time process has only four
      stages (received → scored → decided → settled) and they fly past
      in <800ms, so a spatial rail wastes pixels.
    - Sparkline visualisation is dropped from KPIs to keep the band
      under 90px tall.

