# Test canvas — next-best-action recommendations (recommendations console).

use_case_id: nba-recommendations-test
schema_version: "1.0.0"
created_at: "2026-05-11T05:36:00Z"

console_pattern: recommendations
use_case_archetype: agent-suggestion-queue@1.0

# Recommendations = agent suggestions queued for human disposition.
# Pages: queue (sortable), recommendation-detail (rationale + evidence),
# disposition flow (accept | reject | snooze | escalate).

hitl_gates:
  - name: rm_disposition
    irrevocable: false
    description: "Relationship manager accepts/rejects/snoozes (reversible — analytics tracks override rate)"
  - name: rm_send_to_customer
    irrevocable: true
    description: "RM hits 'send' on accepted recommendation (customer-visible action — locked)"

atomic_services_reused:
  - peer-and-industry-context
  - exposure-aggregator

net_new_atomic_services:
  - name: customer-360-feature-builder
    purpose: "Build feature vector for ranker from customer profile + recent events"

multi_agent_pattern: classifier-extractor-decider@1.0

agent_archetypes_reused: []

net_new_agents:
  - name: nba-rationale-writer
    purpose: "Convert ranker output + feature vector into 1-paragraph RM-facing rationale"

shared_rules_reused: []

net_new_rules:
  - name: nba_eligibility_filter
    citation: "Bank Policy POL-NBA-2024-05 — Customer eligibility for outreach"
    inputs_sketch: "consent_status, recent_contact_count, regulation_band → eligible | filtered"

model_provider: vertex_gemini
provider_prereqs_confirmed:
  - "Vertex ADC available"
  - "us-central1 region pinned"
  - "roles/aiplatform.user granted"
  - "response_schema enabled"
provider_prereqs_pending: []
compliance_scope: lightweight
eval_framework_wired: true

notes: |
  Recommendations pattern test — proves factory handles agent-suggestion
  queues with disposition flows. The "unit" is a single recommendation.
  Watch for:
  - Whether designer agents include disposition affordances on the queue
    (not just the detail page)
  - Whether rationale + evidence are visible BEFORE the human acts
  - Whether the irrevocable 'send' gate is properly modeled
