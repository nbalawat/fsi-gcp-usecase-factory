# Cloud Build template for ephemeral design-proposal Cloud Run services.
#
# One template, parameterized by substitutions. /fsi-design-proposals
# expands this into 4 concurrent gcloud builds — one per option.
#
# Substitutions:
#   _USE_CASE  — kebab-case use case id (e.g. "mortgage-origination")
#   _OPTION    — one of "a", "b", "c", "d", "e", "f"
#   _PROJECT   — GCP project id (defaults to PROJECT_ID at submission)
#   _REGION    — Cloud Run region (default us-central1)
#
# Submit:
#   gcloud builds submit . \
#     --config infra/templates/design-proposal-cloudbuild.yaml \
#     --substitutions=_USE_CASE=mortgage-origination,_OPTION=a
#
# The image is tagged once per (uc, option) — repeat builds with the same
# substitutions overwrite the prior ephemeral. Cleanup script
# (scripts/cleanup_design_proposals.sh) tears these down after the user
# picks a winner.

substitutions:
  _USE_CASE: ""               # required; build fails if empty
  _OPTION: ""                 # required
  _REGION: "us-central1"

steps:
  # ── 1. Sanity check substitutions ────────────────────────────────────
  - id: "validate-args"
    name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -e
        if [ -z "$_USE_CASE" ]; then echo "ERROR: _USE_CASE substitution is required"; exit 1; fi
        if [ -z "$_OPTION" ]; then echo "ERROR: _OPTION substitution is required"; exit 1; fi
        case "$_OPTION" in
          a|b|c|d|e|f) ;;
          *) echo "ERROR: _OPTION must be one of a/b/c/d/e/f, got '$_OPTION'"; exit 1 ;;
        esac
        if [ ! -d "usecases/$_USE_CASE/ui/proposals/option-$_OPTION" ]; then
          echo "ERROR: missing usecases/$_USE_CASE/ui/proposals/option-$_OPTION"
          exit 1
        fi
        echo "✓ args ok: uc=$_USE_CASE option=$_OPTION region=$_REGION"

  # ── 2. Build the option's Next.js image ──────────────────────────────
  # Each option has its own Dockerfile under
  # usecases/<uc>/ui/proposals/option-<x>/Dockerfile, modeled on the
  # pipeline-console Dockerfile but rooted at the option's source tree.
  - id: "build-image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--file"
      - "usecases/${_USE_CASE}/ui/proposals/option-${_OPTION}/Dockerfile"
      - "--tag"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/fsi-services/uc-${_USE_CASE}-design-${_OPTION}:latest"
      - "--cache-from"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/fsi-services/uc-${_USE_CASE}-design-${_OPTION}:latest"
      - "."
    waitFor: ["validate-args"]

  # ── 3. Push to Artifact Registry ─────────────────────────────────────
  - id: "push-image"
    name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/fsi-services/uc-${_USE_CASE}-design-${_OPTION}:latest"
    waitFor: ["build-image"]

  # ── 4. Deploy to Cloud Run with a deterministic service name ─────────
  # Service: fsi-uc-<uc>-design-<option>
  # The cleanup script greps for fsi-uc-*-design-* to tear these down.
  - id: "deploy-cloud-run"
    name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        set -e
        SERVICE="fsi-uc-${_USE_CASE}-design-${_OPTION}"
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/fsi-services/uc-${_USE_CASE}-design-${_OPTION}:latest"
        echo "→ deploying $${SERVICE}"
        gcloud run deploy "$${SERVICE}" \
          --image="$${IMAGE}" \
          --region="${_REGION}" \
          --platform=managed \
          --allow-unauthenticated \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=2 \
          --timeout=60 \
          --set-env-vars="DESIGN_OPTION=${_OPTION},USE_CASE=${_USE_CASE},NODE_ENV=production" \
          --labels="kind=design-proposal,use-case=${_USE_CASE},option=${_OPTION}" \
          --quiet
        URL=$(gcloud run services describe "$${SERVICE}" --region="${_REGION}" --format='value(status.url)')
        echo "$${URL}" > /workspace/url.txt
        echo "✓ deployed $${SERVICE} → $${URL}"
    waitFor: ["push-image"]

  # ── 5. Capture URL into the option's manifest ────────────────────────
  # The /fsi-design-proposals skill reads the URL back from build artifacts;
  # also writes to .fsi-state/<uc>/proposals/<option>.url for local discovery.
  - id: "capture-url"
    name: "gcr.io/cloud-builders/gcloud"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        URL=$(cat /workspace/url.txt)
        echo "url:$${URL}"
        # /fsi-design-proposals downloads /workspace/url.txt as a build artifact.
    waitFor: ["deploy-cloud-run"]

artifacts:
  objects:
    location: "gs://${PROJECT_ID}-fsi-design-build-artifacts/${_USE_CASE}/${_OPTION}/${BUILD_ID}/"
    paths: ["/workspace/url.txt"]

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/fsi-services/uc-${_USE_CASE}-design-${_OPTION}:latest"

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

# 30 min — Next.js cold builds + Cloud Run deploy + propagation should
# fit in ~6-12 min. Generous ceiling allows for flaky pulls.
timeout: 1800s
