# Rendered with:
#   deadline_iso: "2026-05-09T17:00:00Z"
#   alert_thresholds_pct: [50, 75, 90]
#   alert_topic: projects/bank-prod/topics/regclock-credit-memo
#   breach_action: escalate

- regclock_init:
    assign:
      - regclock_start_ts: ${sys.now()}
      - regclock_deadline: "2026-05-09T17:00:00Z"
      - regclock_thresholds: [50, 75, 90]
      - regclock_fired: []

- regclock_monitor:
    parallel:
      shared: [regclock_fired]
      branches:
        - clock_branch:
            steps:
              - clock_loop:
                  for:
                    value: pct
                    in: [50, 75, 90]
                    steps:
                      - sleep_until_pct:
                          call: sys.sleep_until
                          args:
                            time: ${time.format(regclock_start_ts + (time.parse(regclock_deadline) - regclock_start_ts) * pct / 100)}
                      - publish_threshold:
                          call: googleapis.pubsub.v1.projects.topics.publish
                          args:
                            topic: projects/bank-prod/topics/regclock-credit-memo
                            body:
                              messages:
                                - attributes:
                                    context_id: ${context_id}
                                    kind: "regclock-threshold"
                                    pct: ${string(pct)}
                                  data: ${base64.encode(json.encode({"deadline": regclock_deadline, "pct": pct}))}
                      - record_fired:
                          assign:
                            - regclock_fired: ${list.concat(regclock_fired, pct)}
              - sleep_until_breach:
                  call: sys.sleep_until
                  args:
                    time: ${regclock_deadline}
              - publish_breach:
                  call: googleapis.pubsub.v1.projects.topics.publish
                  args:
                    topic: projects/bank-prod/topics/regclock-credit-memo
                    body:
                      messages:
                        - attributes:
                            context_id: ${context_id}
                            kind: "regclock-breach"
                            action: "escalate"
                          data: ${base64.encode(json.encode({"deadline": regclock_deadline}))}
